<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Quadro de avisos online da Congregação Barro Branco, atualizado automaticamente por uma planilha pública.">
  <title>ANÚNCIOS BARRO BRANCO - 86447/SP-104</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1>ANÚNCIOS BARRO BRANCO - 86447/SP-104</h1>
      <p class="header-line" aria-hidden="true"></p>
    </div>
  </header>

  <main class="container" id="conteudo-principal">
    <section class="dashboard" aria-label="Resumo do quadro de avisos">
      <div class="status-panel">
        <p class="status-label">Anúncios carregados</p>
        <strong id="announcement-count">0</strong>
      </div>

      <div class="status-panel">
        <p class="status-label">Última atualização</p>
        <strong id="last-updated">Aguardando dados...</strong>
      </div>

      <button class="refresh-button" id="refresh-button" type="button">
        Atualizar agora
      </button>
    </section>

    <div class="loading" id="loading" role="status" aria-live="polite">
      <span class="spinner" aria-hidden="true"></span>
      <span>Carregando anúncios...</span>
    </div>

    <section class="columns" aria-label="Quadro de avisos">
      <div class="column">
        <h2>📅 PRÓXIMOS EVENTOS DA CONGREGAÇÃO!</h2>
        <div class="cards-list" id="event-cards" aria-live="polite"></div>
      </div>

      <div class="column">
        <h2>🔗 LINKS ÚTEIS</h2>
        <div class="cards-list" id="link-cards" aria-live="polite"></div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>Atualizado automaticamente a cada 60 segundos.</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
